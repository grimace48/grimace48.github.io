<head>

<meta charset="UTF-8">

<title>Juno's Journal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

<script> // functions
  // js functions
const SAVE_KEY = "junoJournalSave";

let currentScene = "s1";
let path = {};
let reaction = null;
let pendingScene = null;
let history = [];

function render() {
    const scene = SCENES[currentScene];
    renderSymbols();
    chapter.textContent = reaction
        ? reaction.title || "The Ink Settles"
        : scene.title;
    renderStory(scene);
    renderChoices(scene);
    backBtn.style.display = history.length > 0 ? "inline-block" : "none";
    saveGame();
}

function renderStory(scene){
    story.innerHTML = "";
    const paragraphs = reaction
        ? reaction.text
        : resolve(scene.entries);
    paragraphs.forEach(text=>{
        const p = document.createElement("p");
        p.textContent = text;
        if(story.children.length===0)
            p.classList.add("opening");
        story.appendChild(p);
    });
}


function renderChoices(scene){

    choices.innerHTML="";

    if(reaction){

        const button=document.createElement("button");

        button.textContent="Turn the Page";

        button.onclick=nextScene;

        choices.appendChild(button);

        return;

    }

    const list=resolve(scene.choices);

    list.forEach(choice=>{

        const button=document.createElement("button");

        button.className="choice";

        button.textContent=choice.label;

        button.onclick=()=>selectChoice(choice);

        choices.appendChild(button);

    });

}

function selectChoice(choice){

    history.push({ scene: currentScene, path: { ...path } });  
    Object.assign(path, choice.flag);

    // Skip reaction pages
    if(true){

        currentScene = resolve(choice.next);

        reaction = null;

        pendingScene = null;

        render();

        return;

    }

    reaction = {

        title: choice.reactionTitle,

        text: Array.isArray(resolve(choice.reaction))
            ? resolve(choice.reaction)
            : [resolve(choice.reaction)]

    };

    pendingScene = resolve(choice.next);

    render();

}

function nextScene(){

    currentScene=pendingScene;

    reaction=null;

    pendingScene=null;

    render();

}

function goBack(){

    if(history.length === 0)
        return;

    const prev = history.pop();

    currentScene = prev.scene;

    path = prev.path;

    reaction = null;

    pendingScene = null;

    render();

}

function restartJournal(){

    if(!confirm("Start the journal over?"))
        return;

    currentScene="s1";

    path={};

    reaction=null;

    pendingScene=null;
    history = [];
    saveGame();

    render();

}

function saveGame(){

    localStorage.setItem(

        SAVE_KEY,

        JSON.stringify({

            scene:currentScene,

            path:path,

            reaction:reaction,

            pending:pendingScene,

            history:history

        })

    );

}

function loadGame(){

    const save=localStorage.getItem(SAVE_KEY);

    if(!save)
        return;

    const data=JSON.parse(save);

    currentScene=data.scene;

    path=data.path;

    reaction=data.reaction;

    pendingScene=data.pending;
    history=data.history||[];

}

function resolve(value){

    if(typeof value==="function")
        return value(path);

    return value;

}

function renderSymbols(){

    symbols.innerHTML = "";

    const icons = [];

    // ---------- Childhood ----------
    if(path.s1 === "stone")
        icons.push("🪨");

    if(path.s1 === "fire")
        icons.push("🔥");

    // ---------- Escape ----------
    if(path.escape === "planned")
        icons.push("🐎");

    if(path.escape === "night")
        icons.push("🌙");

    // ---------- Zinnia ----------
    if(path.s3 === "burn")
        icons.push("🩸");

    if(path.s3 === "flee")
        icons.push("🕊");

    // Draw them

    icons.forEach(icon=>{

        const span=document.createElement("span");

        span.textContent=icon;

        symbols.appendChild(span);

    });

}

</script>
