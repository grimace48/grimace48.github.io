<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Juno's Journal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

<script>
const SAVE_KEY = "junoJournalSave";

let currentScene = "s1";
let path = {};
let reaction = null;
let pendingScene = null;

function render() {
    const scene = SCENES[currentScene];
    renderSymbols();
    chapter.textContent = reaction
        ? reaction.title || "The Ink Settles"
        : scene.title;
    renderStory(scene);
    renderChoices(scene);
    saveGame();
}

function renderStory(scene){
    story.innerHTML = "";
    const paragraphs = reaction
        ? reaction.text
        : resolve(scene.entries);
    paragraphs.forEach(text=>{
        const p = document.createElement("p");
        p.textContent = text;
        if(story.children.length===0)
            p.classList.add("opening");
        story.appendChild(p);
    });
}


function renderChoices(scene){

    choices.innerHTML="";

    if(reaction){

        const button=document.createElement("button");

        button.textContent="Turn the Page";

        button.onclick=nextScene;

        choices.appendChild(button);

        return;

    }

    const list=resolve(scene.choices);

    list.forEach(choice=>{

        const button=document.createElement("button");

        button.className="choice";

        button.textContent=choice.label;

        button.onclick=()=>selectChoice(choice);

        choices.appendChild(button);

    });

}

function selectChoice(choice){

    Object.assign(path, choice.flag);

    // Skip reaction pages
    if(choice.skipReaction){

        currentScene = resolve(choice.next);

        reaction = null;

        pendingScene = null;

        render();

        return;

    }

    reaction = {

        title: choice.reactionTitle,

        text: Array.isArray(resolve(choice.reaction))
            ? resolve(choice.reaction)
            : [resolve(choice.reaction)]

    };

    pendingScene = resolve(choice.next);

    render();

}

function nextScene(){

    currentScene=pendingScene;

    reaction=null;

    pendingScene=null;

    render();

}

function restartJournal(){

    if(!confirm("Start the journal over?"))
        return;

    currentScene="s1";

    path={};

    reaction=null;

    pendingScene=null;

    saveGame();

    render();

}

function saveGame(){

    localStorage.setItem(

        SAVE_KEY,

        JSON.stringify({

            scene:currentScene,

            path:path,

            reaction:reaction,

            pending:pendingScene

        })

    );

}

function loadGame(){

    const save=localStorage.getItem(SAVE_KEY);

    if(!save)
        return;

    const data=JSON.parse(save);

    currentScene=data.scene;

    path=data.path;

    reaction=data.reaction;

    pendingScene=data.pending;

}

function resolve(value){

    if(typeof value==="function")
        return value(path);

    return value;

}

function renderSymbols(){

    symbols.innerHTML = "";

    const icons = [];

    // ---------- Childhood ----------
    if(path.s1 === "stone")
        icons.push("🪨");

    if(path.s1 === "fire")
        icons.push("🔥");

    // ---------- Escape ----------
    if(path.escape === "planned")
        icons.push("🐎");

    if(path.escape === "night")
        icons.push("🌙");

    // ---------- Zinnia ----------
    if(path.s3 === "burn")
        icons.push("🩸");

    if(path.s3 === "flee")
        icons.push("🕊");

    // Draw them

    icons.forEach(icon=>{

        const span=document.createElement("span");

        span.textContent=icon;

        symbols.appendChild(span);

    });

}

</script>

</head>

<div id="journal">

<script>
// ---------- STORY DATA ----------
const SCENES = {

    choices: [
      {
        label: "Continue...",
        flag: {},

    ]

  s5: {
    title: "Chapter 5 — Turf War",

      {

        next: "s6",
        reactionTitle: "Chapter 5-1 — Color",

    entries: [

    ],

  s8: {

    entries: (path) => {

        "Then I heard voices. Boots crunched along the path to my right. I counted seven men shambling toward the hovel.",
        "I burst through a collapsed section of the wall before anyone else could announce our arrival. Two cultists turned toward me. Too slow.",

        "The bare-chested lunatic reached the old priest leading the ritual and brought his club crashing down. The chanting stopped. The ritual was over.",

        "\"I like you less than my hammer does,\" I said. \"And it hates you.\"",

    choices: (path) => {
      const opts = [
        {
          label: "Dion caught me off guard. Brush it off, for now at least.",
          flag: { s8: "neutral" },
          next: "s9_1",

  s9_1: {

        label: "Continue toward Braxia...",
        flag: {},

    title: "Chapter 9-2 — Sylvanas",
    entries: [

    choices: [

  s10: {

          label: "Pounce on Cassian and go wild!",

    choices: (path) => {

        return [
          {
            label: "Run. Get out with Leif while you still can.",
            flag: { s11: "escape" },
            next: (p) => (p.s1 === "stone" ? "end_leif_happy" : "end_leif_war"),
            reaction: "We ran. Behind us, the feast dissolved into screaming."
          },
          {
            label: "Stay and fight for the others.",
            flag: { s11: "fight" },
            next: "end_tpk",
            reaction: "We fought. It wasn't enough."
          }
        ];
      }
      if (["jaksyn", "cassian", "dorian"].includes(path.romance)) {
        return [
          {
            label: "Continue...",
            flag: {},
            next: "end_tpk_leif_escapes",
            skipReaction: true
          }
        ];
      }
      return [
        {
          label: "Continue...",
          flag: {},
          next: "s12",
          skipReaction: true
        }
      ];
    }
  },

  s12: {
    title: "Chapter 12 — Azmekal",
    entries: [
      "Vera Morningstar had been taken, infected with the Wither for what she'd done to save Cassian. Grief aside, there was no time — Lord Adrian's alliance was struck, and Azmekal waited beneath Braxia."
    ],
    choices: (path) => {
      if (path.oath === "vengeance" && path.romance === "dion") {
        return [{ label: "Continue...", flag: {}, next: "s13", skipReaction: true }];
      }
      if (path.oath === "devotion" && path.romance === "saberic") {
        return [{ label: "Continue...", flag: {}, next: "s13", skipReaction: true }];
      }
      return [{ label: "Continue...", flag: {}, next: "end_azmekal_fall", skipReaction: true }];
    }
  },

  s13: {
    title: "Chapter 13 — Brekka",
    entries: [
      "The frozen throne of Brekka waited beneath a dying sky. Somewhere below it, the werewolf demon lord Hrathgar was already waiting for us."
    ],
    choices: (path) => {
      if (path.oath === "vengeance") {
        return [{ label: "Challenge Hrathgar. Buy them the time they need.", flag: {}, next: "end_vengeance_victory", skipReaction: true }];
      }
      if (path.oath === "devotion" && path.romance === "saberic") {
        return [{ label: "Stand together.", flag: {}, next: "end_devotion_victory", skipReaction: true }];
      }
      return [{ label: "Continue...", flag: {}, next: "end_azmekal_fall", skipReaction: true }];
    }
  },

  end_leif_happy: {
    title: "Epilogue — The Quiet Years",
    entries: [
      "We stayed unknown, taking odd jobs, far from Xavier's war. Days happy together. It was more than I ever thought I'd get."
    ],
    choices: []
  },
  end_leif_war: {
    title: "Epilogue — The Pull Back",
    entries: [
      "For a while it was enough. Then the fire in me pulled me back toward the fight, and I left him. Leif heard word of my death in battle against Xavier's army not long after."
    ],
    choices: []
  },
  end_tpk: {
    title: "Epilogue — The Feast Ends in Blood",
    entries: [
      "We fought. Every one of us went down before the night was through."
    ],
    choices: []
  },
  end_tpk_leif_escapes: {
    title: "Epilogue — The One Who Slipped Away",
    entries: [
      "The rest of the party was killed or captured in the chaos. Only Leif slipped into the shadows, never to be heard from again."
    ],
    choices: []
  },
  end_azmekal_fall: {
    title: "Epilogue — The Undead Reign",
    entries: [
      "Azmekal did not fall. He wiped us out beneath Braxia's streets, and Xavier was resurrected using Vera's body. The undead now run rampant across Kjlovania."
    ],
    choices: []
  },
  end_vengeance_victory: {
    title: "Epilogue — What Vengeance Bought",
    entries: [
      "I challenged Hrathgar myself, a distraction while the others rallied a band of rebel werewolves to overthrow him. Xavier was resurrected using Vera's captured body anyway. Jaksyn died in that battle.",
      "But the six who remained went on to stop Xavier for good, defeating every demon lord in his service. Kjlovania was torn apart by war — but in the end, evil was stopped. Congratulations."
    ],
    choices: []
  },
  end_devotion_victory: {
    title: "Epilogue — The Dawn Holds",
    entries: [
      "We stood together and defeated Hrathgar, then went on to prevent Xavier's resurrection on the blood moon entirely. The Crimson Sun began to fall apart.",
      "The heroes continued to watch over Kjlovania in an era of peace — though none of us ever fully rested. Xavier might rise again one day. Congratulations."
    ],
    choices: []
  }

}
